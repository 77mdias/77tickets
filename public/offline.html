<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sem conexão — TicketFlow</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #18181b;
    }
    .card {
      text-align: center;
      padding: 2.5rem;
      border-radius: 1rem;
      border: 1px solid #e4e4e7;
      background: #fff;
      max-width: 400px;
      width: 90%;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { font-size: 0.875rem; color: #52525b; margin: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Você está offline</h1>
    <p>Verifique sua conexão com a internet e tente novamente.</p>
  </div>
</body>
</html>

name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      has_test_database_url: ${{ steps.check.outputs.has_test_database_url }}
    steps:
      - name: Check TEST_DATABASE_URL
        id: check
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: |
          has_test_database_url=false
          if [ -n "$TEST_DATABASE_URL" ]; then
            has_test_database_url=true
          fi
          echo "has_test_database_url=$has_test_database_url" >> "$GITHUB_OUTPUT"

  quality:
    name: Quality Gate
    needs: preflight
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + architecture + tests + build
        run: bun run ci:quality

  integration:
    name: Integration Tests
    needs: [preflight, quality]
    runs-on: ubuntu-latest
    if: ${{ needs.preflight.outputs.has_test_database_url == 'true' }}
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run ci:integration

  integration-skipped:
    name: Integration Tests (skipped)
    needs: [preflight, quality]
    runs-on: ubuntu-latest
    if: ${{ needs.preflight.outputs.has_test_database_url != 'true' }}
    steps:
      - name: Emit skip reason
        run: |
          echo "Skipping integration tests because TEST_DATABASE_URL is not configured in repository secrets."

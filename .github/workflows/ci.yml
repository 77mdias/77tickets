name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint + architecture + tests + build
        run: bun run ci:quality

  integration:
    name: Integration Tests
    needs: quality
    runs-on: ubuntu-latest
    if: ${{ secrets.TEST_DATABASE_URL != '' }}
    env:
      TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run integration tests
        run: bun run ci:integration

  integration-skipped:
    name: Integration Tests (skipped)
    needs: quality
    runs-on: ubuntu-latest
    if: ${{ secrets.TEST_DATABASE_URL == '' }}
    steps:
      - name: Emit skip reason
        run: |
          echo "Skipping integration tests because TEST_DATABASE_URL is not configured in repository secrets."

name: CD (Cloudflare Workers)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: cd-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: ${{ hashFiles('wrangler.toml') != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && (github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'preview')) }}
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (preview)
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml --env preview

      - name: Smoke test /api/events
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        run: |
          curl --fail --show-error --silent --max-time 20 \
            "${{ steps.deploy.outputs.deployment-url }}/api/events?limit=1" > /dev/null

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    if: ${{ hashFiles('wrangler.toml') != '' && secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && secrets.DATABASE_URL != '' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')) }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (production)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (production)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml --env production

      - name: Smoke test /api/events
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        run: |
          curl --fail --show-error --silent --max-time 20 \
            "${{ steps.deploy.outputs.deployment-url }}/api/events?limit=1" > /dev/null

  deploy-skipped-no-wrangler:
    name: Deploy skipped (wrangler.toml missing)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('wrangler.toml') == '' }}
    steps:
      - name: Emit skip reason
        run: echo "Skipping CD workflow because wrangler.toml is not present in this repository yet."

  deploy-skipped-missing-secrets:
    name: Deploy skipped (missing secrets)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('wrangler.toml') != '' && (secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '') }}
    steps:
      - name: Emit skip reason
        run: |
          echo "Skipping CD workflow because Cloudflare secrets are not configured."

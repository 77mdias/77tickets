name: CD (Cloudflare Workers)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: cd-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      has_wrangler: ${{ steps.check.outputs.has_wrangler }}
      should_deploy_preview: ${{ steps.check.outputs.should_deploy_preview }}
      should_deploy_production: ${{ steps.check.outputs.should_deploy_production }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check preconditions
        id: check
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          has_wrangler=false
          should_deploy_preview=false
          should_deploy_production=false

          if [ -f wrangler.toml ]; then
            has_wrangler=true
          fi

          if [ "$EVENT_NAME" = "pull_request" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$TARGET" = "preview" ]; }; then
            should_deploy_preview=true
          fi

          if [ "$EVENT_NAME" = "push" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$TARGET" = "production" ]; }; then
            should_deploy_production=true
          fi

          echo "has_wrangler=$has_wrangler" >> "$GITHUB_OUTPUT"
          echo "should_deploy_preview=$should_deploy_preview" >> "$GITHUB_OUTPUT"
          echo "should_deploy_production=$should_deploy_production" >> "$GITHUB_OUTPUT"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_deploy_preview == 'true' && needs.preflight.outputs.has_wrangler == 'true' }}
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets (preview)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID DATABASE_URL BETTER_AUTH_SECRET BETTER_AUTH_URL NEXT_PUBLIC_APP_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required preview secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (preview)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --name 77tickets-preview --keep-vars

      - name: Smoke test (preview)
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          base_url="${DEPLOYMENT_URL%/}"
          echo "Smoke testing: $base_url"
          for i in 1 2 3; do
            if curl --fail --show-error --silent --max-time 20 \
                "$base_url/api/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Smoke test failed after 3 attempts"
          exit 1

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_deploy_production == 'true' && needs.preflight.outputs.has_wrangler == 'true' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
        run: |
          missing=0
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID DATABASE_URL BETTER_AUTH_SECRET BETTER_AUTH_URL NEXT_PUBLIC_APP_URL; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required production secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (production)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (production)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --name 77tickets --keep-vars

      - name: Smoke test (production)
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          base_url="${DEPLOYMENT_URL%/}"
          echo "Smoke testing: $base_url"
          for i in 1 2 3; do
            if curl --fail --show-error --silent --max-time 20 \
                "$base_url/api/health" > /dev/null; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Smoke test failed after 3 attempts"
          exit 1

  deploy-skipped-no-wrangler:
    name: Deploy skipped (wrangler.toml missing)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.has_wrangler != 'true' }}
    steps:
      - name: Emit skip reason
        run: echo "Skipping CD workflow because wrangler.toml is not present in this repository yet."

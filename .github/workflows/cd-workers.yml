name: CD (Cloudflare Workers)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: cd-workers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      has_wrangler: ${{ steps.check.outputs.has_wrangler }}
      has_cf_api_token: ${{ steps.check.outputs.has_cf_api_token }}
      has_cf_account_id: ${{ steps.check.outputs.has_cf_account_id }}
      has_database_url: ${{ steps.check.outputs.has_database_url }}
      should_deploy_preview: ${{ steps.check.outputs.should_deploy_preview }}
      should_deploy_production: ${{ steps.check.outputs.should_deploy_production }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check preconditions
        id: check
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EVENT_NAME: ${{ github.event_name }}
          TARGET: ${{ github.event.inputs.target }}
        run: |
          has_wrangler=false
          has_cf_api_token=false
          has_cf_account_id=false
          has_database_url=false
          should_deploy_preview=false
          should_deploy_production=false

          if [ -f wrangler.toml ]; then
            has_wrangler=true
          fi

          if [ -n "$CF_API_TOKEN" ]; then
            has_cf_api_token=true
          fi

          if [ -n "$CF_ACCOUNT_ID" ]; then
            has_cf_account_id=true
          fi

          if [ -n "$DATABASE_URL" ]; then
            has_database_url=true
          fi

          if [ "$EVENT_NAME" = "pull_request" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$TARGET" = "preview" ]; }; then
            should_deploy_preview=true
          fi

          if [ "$EVENT_NAME" = "push" ] || { [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$TARGET" = "production" ]; }; then
            should_deploy_production=true
          fi

          echo "has_wrangler=$has_wrangler" >> "$GITHUB_OUTPUT"
          echo "has_cf_api_token=$has_cf_api_token" >> "$GITHUB_OUTPUT"
          echo "has_cf_account_id=$has_cf_account_id" >> "$GITHUB_OUTPUT"
          echo "has_database_url=$has_database_url" >> "$GITHUB_OUTPUT"
          echo "should_deploy_preview=$should_deploy_preview" >> "$GITHUB_OUTPUT"
          echo "should_deploy_production=$should_deploy_production" >> "$GITHUB_OUTPUT"

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_deploy_preview == 'true' && needs.preflight.outputs.has_wrangler == 'true' && needs.preflight.outputs.has_cf_api_token == 'true' && needs.preflight.outputs.has_cf_account_id == 'true' }}
    environment: preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (preview)
        if: ${{ needs.preflight.outputs.has_database_url == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --name 77tickets-preview --keep-vars

      - name: Smoke test /api/events
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        run: |
          curl --fail --show-error --silent --max-time 20 \
            "${{ steps.deploy.outputs.deployment-url }}/api/events?limit=1" > /dev/null

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.should_deploy_production == 'true' && needs.preflight.outputs.has_wrangler == 'true' && needs.preflight.outputs.has_cf_api_token == 'true' && needs.preflight.outputs.has_cf_account_id == 'true' && needs.preflight.outputs.has_database_url == 'true' }}
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Run migrations (production)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bun run db:migrate

      - name: Deploy to Cloudflare (production)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config dist/server/wrangler.json --name 77tickets --keep-vars

      - name: Smoke test /api/events
        if: ${{ steps.deploy.outputs.deployment-url != '' }}
        run: |
          curl --fail --show-error --silent --max-time 20 \
            "${{ steps.deploy.outputs.deployment-url }}/api/events?limit=1" > /dev/null

  deploy-skipped-no-wrangler:
    name: Deploy skipped (wrangler.toml missing)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.has_wrangler != 'true' }}
    steps:
      - name: Emit skip reason
        run: echo "Skipping CD workflow because wrangler.toml is not present in this repository yet."

  deploy-skipped-missing-secrets:
    name: Deploy skipped (missing secrets)
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.has_wrangler == 'true' && ((needs.preflight.outputs.should_deploy_preview == 'true' && (needs.preflight.outputs.has_cf_api_token != 'true' || needs.preflight.outputs.has_cf_account_id != 'true')) || (needs.preflight.outputs.should_deploy_production == 'true' && (needs.preflight.outputs.has_cf_api_token != 'true' || needs.preflight.outputs.has_cf_account_id != 'true' || needs.preflight.outputs.has_database_url != 'true'))) }}
    steps:
      - name: Emit skip reason
        run: |
          echo "Skipping CD workflow because required secrets are not configured for this target."

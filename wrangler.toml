name = "77tickets"
main = "./worker/index.ts"
compatibility_date = "2024-12-30"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Serves static assets generated by vinext build.
assets = { directory = "./dist/client", binding = "ASSETS" }

[env.preview]
name = "77tickets-preview"
workers_dev = true

[env.production]
name = "77tickets"
workers_dev = true
